name: CI

on:
  pull_request:
  push:
    paths-ignore:
    - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        emacs_version:
          - 27.1
          - 27.2
          - 28.1
          - 28.2
          - 29.1
          - 29.3
          - 29.4
          - 30.1
        experimental: [false]
        include:
          - emacs_version: snapshot
            experimental: true
    steps:
    - uses: purcell/setup-emacs@master
      with:
        version: ${{ matrix.emacs_version }}

    - uses: actions/checkout@v6
    - name: Check startup
      run: ./test-startup.sh
    - name: Check Task Table behavior
      run: emacs -Q --batch -l tests/init-local-vulpea-tests.el -f ert-run-tests-batch-and-exit
    - name: Check real Task Table integration when available
      run: |
        emacs -Q --batch \
          --eval '(setq user-emacs-directory default-directory package-user-dir (expand-file-name (format "elpa-%s.%s" emacs-major-version emacs-minor-version) user-emacs-directory))' \
          --funcall package-initialize \
          -l tests/init-local-vulpea-integration-tests.el \
          -f ert-run-tests-batch-and-exit
